<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ManuscriptZero</title>
  <link rel="icon" href="favicon.ico" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --gold:     #b8964a;
      --gold-dim: #7a6030;
      --white:    #e8e4dc;
      --dim:      #555;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .scene {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .rule-top {
      position: absolute;
      top: 3rem;
      left: 50%;
      transform: translateX(-50%);
      width: min(480px, 90vw);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
    }

    .sigil {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 0.12em;
      line-height: 1;
      margin-bottom: 0.6rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.1s ease forwards;
    }

    .site-label {
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 2.4rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.25s ease forwards;
    }

    #gear-container {
      width: 190px;
      height: 190px;
      position: relative;
      opacity: 0;
      animation: fadeUp 0.9s 0.4s ease forwards;
    }

    #vault-gear {
      width: 100%;
      height: 100%;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      filter: drop-shadow(0 0 10px rgba(184, 150, 74, 0.2));
    }

    #vault-gear.unlocking {
      transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #vault-gear.unlock-glow {
      animation: gearGlow 1.5s ease-out forwards;
    }

    @keyframes gearGlow {
      0% { filter: brightness(1) drop-shadow(0 0 15px var(--gold)); }
      100% { filter: brightness(1.8) drop-shadow(0 0 55px var(--gold)); transform: scale(1.08); }
    }

    .gate {
      margin-top: 2.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.55s ease forwards;
    }

    .boxes {
      position: relative;
      display: flex;
      gap: 0.6rem;
    }

    .box {
      width: 1.4rem;
      height: 1.9rem;
      border-bottom: 1px solid var(--dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 300;
      color: var(--gold);
      text-transform: lowercase;
      transition: border-color 0.3s;
    }

    .box.filled { border-color: var(--gold-dim); }

    .box .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .box .dot.visible { opacity: 1; }

    .box .letter {
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .box .letter.visible { opacity: 1; }

    #phraseInput {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      border: none;
      outline: none;
      background: transparent;
      caret-color: transparent;
      color: transparent;
      font-size: 16px;
    }

    .status-msg {
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--dim);
      height: 1em;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .status-msg.visible { opacity: 1; }
    .status-msg.gold { color: var(--gold); }

    .rule-bottom {
      position: absolute;
      bottom: 3rem;
      left: 50%;
      transform: translateX(-50%);
      width: min(480px, 90vw);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
    }

    .bottom-note {
      position: absolute;
      bottom: 1.6rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.5rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--dim);
      white-space: nowrap;
      opacity: 0.5;
    }

    .fade-out {
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="scene" id="scene">
    <div class="rule-top"></div>

    <div class="sigil">V.</div>
    <div class="site-label">ManuscriptZero — Restricted Access</div>

    <div id="gear-container">
      <svg id="vault-gear" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="40" stroke="#b8964a" stroke-width="0.5" stroke-dasharray="2 2"/>
        <path d="M50 5V15M50 95V85M5 50H15M95 50H85M18.2 18.2L25.2 25.2M81.8 81.8L74.8 74.8M18.2 81.8L25.2 74.8M81.8 18.2L74.8 25.2" stroke="#b8964a" stroke-width="3" stroke-linecap="round"/>
        <circle cx="50" cy="50" r="20" stroke="#b8964a" stroke-width="2"/>
        <path d="M45 50L50 45L55 50L50 55Z" fill="#b8964a"/>
      </svg>
    </div>

    <div class="gate">
      <div class="boxes" id="boxes">
        <input
          type="text"
          id="phraseInput"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          inputmode="text"
          maxlength="6"
          autofocus
        />
      </div>
      <div class="status-msg" id="statusMsg"></div>
    </div>

    <div class="rule-bottom"></div>
    <div class="bottom-note">This archive is private</div>
  </div>

  <script>
    if (sessionStorage.getItem('mz_unlocked') === '1') {
      window.location.replace('index.html');
    }

    const PASSPHRASE = 'tacere';
    const REVEAL_MS = 700;

    const boxesEl  = document.getElementById('boxes');
    const input    = document.getElementById('phraseInput');
    const gear     = document.getElementById('vault-gear');
    const statusEl = document.getElementById('statusMsg');
    const scene    = document.getElementById('scene');

    let boxes = [];
    for (let i = 0; i < PASSPHRASE.length; i++) {
      const box = document.createElement('div');
      box.className = 'box';
      box.innerHTML = '<span class="letter"></span><span class="dot"></span>';
      boxesEl.insertBefore(box, input);
      boxes.push(box);
    }

    let revealTimer = null;
    let unlocked = false;

    document.addEventListener('click', () => input.focus());
    window.addEventListener('load', () => input.focus());

    input.addEventListener('input', () => {
      if (unlocked) return;

      const raw = input.value.toLowerCase().replace(/[^a-z]/g, '');
      input.value = raw;

      if (PASSPHRASE.indexOf(raw) !== 0) {
        input.value = raw.slice(0, -1);
        showStatus('not yet', false);
        return;
      }

      hideStatus();
      renderBoxes(raw);

      const progress = raw.length / PASSPHRASE.length;
      gear.style.transform = 'rotate(' + (progress * 300) + 'deg)';

      if (raw.length === PASSPHRASE.length) {
        unlocked = true;
        input.blur();
        input.setAttribute('readonly', true);
        unlockSequence();
      }
    });

    function renderBoxes(value) {
      for (let i = 0; i < boxes.length; i++) {
        const letterEl = boxes[i].querySelector('.letter');
        const dotEl = boxes[i].querySelector('.dot');
        boxes[i].classList.toggle('filled', i < value.length);

        if (i < value.length) {
          if (i === value.length - 1) {
            letterEl.textContent = value[i];
            letterEl.classList.add('visible');
            dotEl.classList.remove('visible');
            clearTimeout(revealTimer);
            revealTimer = setTimeout(() => {
              letterEl.classList.remove('visible');
              dotEl.classList.add('visible');
            }, REVEAL_MS);
          } else {
            letterEl.classList.remove('visible');
            dotEl.classList.add('visible');
          }
        } else {
          letterEl.classList.remove('visible');
          dotEl.classList.remove('visible');
          letterEl.textContent = '';
        }
      }
    }

    function showStatus(text, gold) {
      statusEl.textContent = text;
      statusEl.classList.toggle('gold', !!gold);
      statusEl.classList.add('visible');
      clearTimeout(showStatus._t);
      showStatus._t = setTimeout(hideStatus, 1200);
    }

    function hideStatus() {
      statusEl.classList.remove('visible');
    }

    function unlockSequence() {
      showStatus('vault opens', true);
      gear.classList.add('unlocking');
      gear.style.transform = 'rotate(680deg)';

      setTimeout(() => {
        gear.classList.add('unlock-glow');
      }, 300);

      setTimeout(() => {
        sessionStorage.setItem('mz_unlocked', '1');
        sessionStorage.setItem('mz_just_passed_gate', '1');
        document.body.classList.add('fade-out');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 800);
      }, 1900);
    }
  </script>
</body>
</html>
