<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE VAULT | RECORD</title>

<meta name="description" content="Accessing the sanctum of Void Stanza.">
<meta property="og:title" content="THE VAULT | ManuscriptZero">
<meta property="og:description" content="Accessing the sanctum of Void Stanza.">
<meta property="og:image" content="https://voidstanza.github.io/Manuscriptzero/preview.png">
<meta property="og:url" content="https://voidstanza.github.io/Manuscriptzero/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="THE VAULT | ManuscriptZero">
<meta name="twitter:description" content="Accessing the sanctum of Void Stanza.">
<meta name="twitter:image" content="https://voidstanza.github.io/Manuscriptzero/preview.png">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
<script src="stories.js" defer></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:wght@400&family=Montserrat:wght@300;400;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── DARK (default) ── */
body {
  background: #0a0a0b;
  color: #c9c9c9;
  font-family: 'Montserrat', sans-serif;
  transition: background 0.4s ease, color 0.4s ease;
}

/* ── LIGHT ── */
body.light {
  background: #f5f0e8;
  color: #2a2a2a;
}

/* NAV */
#top-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 1.1rem 1.75rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 50;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  background: rgba(10,10,11,0.96);
  backdrop-filter: blur(12px);
  transition: background 0.4s, border-color 0.4s;
}

body.light #top-nav {
  background: rgba(245,240,232,0.97);
  border-bottom-color: rgba(0,0,0,0.08);
}

.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  color: #d4af37;
  cursor: pointer;
  text-decoration: none;
  border: none;
  background: none;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

/* Font buttons */
.font-pill {
  display: flex;
  align-items: center;
  gap: 4px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
  padding: 4px 12px;
  background: rgba(255,255,255,0.03);
  transition: border-color 0.4s, background 0.4s;
}

body.light .font-pill {
  border-color: rgba(0,0,0,0.1);
  background: rgba(0,0,0,0.04);
}

.font-pill button {
  background: none;
  border: none;
  cursor: pointer;
  font-weight: 700;
  font-size: 11px;
  color: #666;
  font-family: 'Montserrat', sans-serif;
  padding: 0 4px;
  transition: color 0.2s;
}

.font-pill button:hover { color: #d4af37; }

body.light .font-pill button { color: #888; }
body.light .font-pill button:hover { color: #d4af37; }

.font-sep { width: 1px; height: 12px; background: rgba(255,255,255,0.08); }
body.light .font-sep { background: rgba(0,0,0,0.1); }

/* Theme button */
#theme-btn {
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
  padding: 5px 16px;
  background: rgba(255,255,255,0.03);
  color: #888;
  font-family: 'Montserrat', sans-serif;
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

#theme-btn:hover { color: #d4af37; border-color: rgba(212,175,55,0.4); }

body.light #theme-btn {
  border-color: rgba(0,0,0,0.1);
  background: rgba(0,0,0,0.04);
  color: #666;
}

/* SCROLL BAR */
#scroll-bar {
  position: fixed;
  top: 0; left: 0;
  height: 2px;
  background: #d4af37;
  width: 0%;
  z-index: 100;
  box-shadow: 0 0 8px #d4af37;
  transition: width 0.1s linear;
}

/* MAIN CONTENT */
#story-container {
  max-width: 660px;
  margin: 0 auto;
  padding: 6.5rem 1.75rem 5rem;
  opacity: 0;
  transition: opacity 0.7s ease;
}

#story-container.loaded { opacity: 1; }

/* Chapter eyebrow */
#chapter-eyebrow {
  font-size: 9px;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: #d4af37;
  opacity: 0.65;
  margin-bottom: 0.6rem;
  font-family: 'Montserrat', sans-serif;
}

/* Title */
#story-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.9rem, 5vw, 3.2rem);
  color: #d4af37;
  line-height: 1.15;
  margin-bottom: 1rem;
}

/* Synopsis */
#story-synopsis {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 1rem;
  color: #666;
  margin-bottom: 2.5rem;
  line-height: 1.7;
}

body.light #story-synopsis { color: #888; }

/* Chapter nav bar */
#ch-bar {
  display: none;
  justify-content: space-between;
  align-items: center;
  padding: 0.65rem 1rem;
  margin-bottom: 2rem;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.02);
  transition: background 0.4s, border-color 0.4s;
}

#ch-bar.show { display: flex; }

body.light #ch-bar {
  border-color: rgba(0,0,0,0.08);
  background: rgba(0,0,0,0.02);
}

.ch-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #666;
  font-family: 'Montserrat', sans-serif;
  transition: color 0.2s;
  padding: 4px 6px;
}

.ch-btn:hover { color: #d4af37; }
.ch-btn:disabled { opacity: 0.2; cursor: default; }

#ch-label {
  font-size: 9px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: #d4af37;
  font-family: 'Montserrat', sans-serif;
}

/* Content */
#story-content {
  font-family: 'Lora', serif;
  line-height: 1.95;
  font-size: 18px;
  transition: font-size 0.2s, color 0.4s;
  color: #b0b0b0;
}

body.light #story-content { color: #3a3a3a; }

#story-content p { margin-bottom: 1.5rem; }

/* Chapter footer */
#ch-footer {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  padding: 3rem 0 2rem;
  margin-top: 3rem;
  border-top: 1px solid rgba(255,255,255,0.05);
}

#ch-footer.show { display: flex; }

body.light #ch-footer { border-top-color: rgba(0,0,0,0.08); }

.ch-end-label {
  font-size: 9px;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: #555;
  font-family: 'Montserrat', sans-serif;
}

#next-ch-btn {
  border: 1px solid rgba(212,175,55,0.4);
  color: #d4af37;
  background: none;
  font-family: 'Montserrat', sans-serif;
  font-size: 10px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  padding: 13px 30px;
  cursor: pointer;
  transition: all 0.25s;
}

#next-ch-btn:hover { background: #d4af37; color: #000; }

#prev-ch-link {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #555;
  font-family: 'Montserrat', sans-serif;
  transition: color 0.2s;
}

#prev-ch-link:hover { color: #d4af37; }

/* ── RESUME POPUP ── */
#resume-popup {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.75);
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
}

#resume-popup.show { display: flex; }

.popup-inner {
  background: #0f0f10;
  border: 1px solid rgba(212,175,55,0.25);
  padding: 2.5rem 2rem;
  max-width: 340px;
  width: 90%;
  text-align: center;
}

body.light .popup-inner {
  background: #ede8de;
  border-color: rgba(212,175,55,0.35);
}

.popup-heading {
  font-family: 'Playfair Display', serif;
  color: #d4af37;
  font-size: 1.3rem;
  margin-bottom: 0.65rem;
}

.popup-body {
  font-size: 11px;
  color: #666;
  letter-spacing: 0.08em;
  margin-bottom: 1.75rem;
  line-height: 1.65;
  font-family: 'Montserrat', sans-serif;
}

.popup-actions {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
}

.popup-yes {
  background: #d4af37;
  color: #000;
  border: none;
  font-family: 'Montserrat', sans-serif;
  font-size: 9px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  padding: 10px 22px;
  cursor: pointer;
  transition: background 0.2s;
}

.popup-yes:hover { background: #c9a227; }

.popup-no {
  background: transparent;
  color: #666;
  border: 1px solid rgba(255,255,255,0.08);
  font-family: 'Montserrat', sans-serif;
  font-size: 9px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  padding: 10px 22px;
  cursor: pointer;
  transition: all 0.2s;
}

body.light .popup-no { border-color: rgba(0,0,0,0.12); }
.popup-no:hover { color: #d4af37; border-color: rgba(212,175,55,0.4); }
</style>

</head>
<body>

<div id="scroll-bar"></div>

<!-- RESUME POPUP -->

<div id="resume-popup">
  <div class="popup-inner">
    <div class="popup-heading">Welcome back.</div>
    <div class="popup-body" id="popup-msg">Resume from where you left off?</div>
    <div class="popup-actions">
      <button class="popup-yes" onclick="doResume()">Resume</button>
      <button class="popup-no" onclick="doStartOver()">Start Over</button>
    </div>
  </div>
</div>

<!-- NAV -->

<nav id="top-nav">
  <button class="nav-logo" onclick="location.href='gallery.html'">V.</button>
  <div class="nav-right">
    <div class="font-pill">
      <button onclick="changeFont(-2)">A−</button>
      <div class="font-sep"></div>
      <button onclick="changeFont(2)">A+</button>
    </div>
    <button id="theme-btn" onclick="toggleTheme()">☽ Dark</button>
  </div>
</nav>

<!-- STORY -->

<main id="story-container">
  <div id="chapter-eyebrow"></div>
  <h1 id="story-title"></h1>
  <p id="story-synopsis"></p>

  <div id="ch-bar">
    <button class="ch-btn" id="prev-ch-top" onclick="goChapter(chIndex - 1)">← Prev</button>
    <span id="ch-label"></span>
    <button class="ch-btn" id="next-ch-top" onclick="goChapter(chIndex + 1)">Next →</button>
  </div>

  <div id="story-content"></div>

  <div id="ch-footer">
    <div class="ch-end-label">✦ End of Chapter <span id="ch-footer-num"></span> ✦</div>
    <button id="next-ch-btn" onclick="goChapter(chIndex + 1)">Next Chapter →</button>
    <button id="prev-ch-link" onclick="goChapter(chIndex - 1)">← Previous Chapter</button>
  </div>
</main>

<script>
  // ── GLOBALS ──
  let fontSize   = parseInt(localStorage.getItem('readerFontSize')) || 18;
  let storyId    = null;
  let story      = null;
  let isNovella  = false;
  let chIndex    = 0;
  let scrollTimer = null;
  let savedData   = null;

  // ── THEME — applied immediately before page renders ──
  (function () {
    const t = localStorage.getItem('vaultTheme') || 'dark';
    if (t === 'light') document.body.classList.add('light');
    document.getElementById('theme-btn').textContent = t === 'light' ? '☀ Light' : '☽ Dark';
  })();

  function toggleTheme() {
    const isLight = document.body.classList.toggle('light');
    const next = isLight ? 'light' : 'dark';
    localStorage.setItem('vaultTheme', next);
    document.getElementById('theme-btn').textContent = isLight ? '☀ Light' : '☽ Dark';
  }

  // ── FONT ──
  function changeFont(d) {
    fontSize = Math.min(Math.max(fontSize + d, 12), 32);
    document.getElementById('story-content').style.fontSize = fontSize + 'px';
    localStorage.setItem('readerFontSize', fontSize);
  }

  // ── SCROLL PROGRESS + AUTO-SAVE ──
  window.addEventListener('scroll', function () {
    const scrolled = document.documentElement.scrollTop;
    const total = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    const pct = total > 0 ? (scrolled / total) * 100 : 0;
    document.getElementById('scroll-bar').style.width = pct + '%';

    if (!storyId) return;
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(function () {
      localStorage.setItem('progress_' + storyId, JSON.stringify({
        pct: pct.toFixed(2),
        ch: chIndex
      }));
    }, 1000);
  });

  // ── SWIPE ──
  let touchY = 0;
  document.addEventListener('touchstart', function(e) { touchY = e.touches[0].clientY; });
  document.addEventListener('touchend', function(e) {
    if (!isNovella) return;
    const dy = touchY - e.changedTouches[0].clientY;
    const atBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 80;
    const atTop = window.scrollY <= 10;
    if (dy > 80 && atBottom) goChapter(chIndex + 1);
    if (dy < -80 && atTop)   goChapter(chIndex - 1);
  });

  // ── RESUME POPUP ──
  function showPopup() {
    const isNovellaResume = isNovella && savedData.ch > 0;
    const pct = Math.round(parseFloat(savedData.pct));
    let msg = '';
    if (isNovellaResume) {
      msg = 'You were on Chapter ' + (savedData.ch + 1) + '. Pick up from there?';
    } else {
      msg = 'You were ' + pct + '% through. Resume from there?';
    }
    document.getElementById('popup-msg').textContent = msg;
    document.getElementById('resume-popup').classList.add('show');
  }

  function doResume() {
    document.getElementById('resume-popup').classList.remove('show');
    if (isNovella) {
      chIndex = savedData.ch || 0;
      renderChapter();
    }
    setTimeout(function () {
      const total = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      window.scrollTo({ top: (parseFloat(savedData.pct) / 100) * total, behavior: 'smooth' });
    }, 300);
  }

  function doStartOver() {
    document.getElementById('resume-popup').classList.remove('show');
    if (isNovella) { chIndex = 0; renderChapter(); }
    window.scrollTo({ top: 0 });
  }

  // ── CHAPTER RENDER ──
  function renderChapter() {
    const ch = story.chapters[chIndex];
    const total = story.chapters.length;

    document.getElementById('chapter-eyebrow').textContent =
      story.title + '  ·  Chapter ' + (chIndex + 1) + ' of ' + total;
    document.getElementById('story-title').textContent = ch.title || ('Chapter ' + (chIndex + 1));
    document.getElementById('story-synopsis').textContent = ch.synopsis || '';
    document.getElementById('story-content').innerHTML = ch.text || '';
    document.getElementById('story-content').style.fontSize = fontSize + 'px';
    document.title = 'THE VAULT | ' + story.title + ' · Ch.' + (chIndex + 1);

    // Ch bar
    document.getElementById('ch-label').textContent = (chIndex + 1) + ' / ' + total;
    document.getElementById('prev-ch-top').disabled = chIndex === 0;
    document.getElementById('next-ch-top').disabled = chIndex === total - 1;

    // Footer
    document.getElementById('ch-footer-num').textContent = chIndex + 1;
    document.getElementById('next-ch-btn').style.display = chIndex < total - 1 ? 'block' : 'none';
    document.getElementById('prev-ch-link').style.display = chIndex > 0 ? 'block' : 'none';
    document.getElementById('ch-footer').classList.add('show');

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function goChapter(i) {
    if (!story || !story.chapters) return;
    if (i < 0 || i >= story.chapters.length) return;
    chIndex = i;
    localStorage.setItem('progress_' + storyId, JSON.stringify({ pct: '0', ch: chIndex }));
    renderChapter();
  }

  // ── INIT ──
  function init() {
    const params = new URLSearchParams(window.location.search);
    storyId = params.get('id');

    if (!storyId || typeof stories === 'undefined') {
      document.getElementById('story-content').textContent = 'Archive error.';
      document.getElementById('story-container').classList.add('loaded');
      return;
    }

    story = stories.find(function(s) { return s.id == storyId; });

    if (!story) {
      document.getElementById('story-content').textContent = 'Record not found.';
      document.getElementById('story-container').classList.add('loaded');
      return;
    }

    isNovella = story.type === 'novella' && Array.isArray(story.chapters);

    // Load saved progress
    try {
      const raw = localStorage.getItem('progress_' + storyId);
      if (raw) savedData = JSON.parse(raw);
    } catch(e) {}

    if (isNovella) {
      document.getElementById('ch-bar').classList.add('show');
      chIndex = 0;
      renderChapter();
      document.getElementById('story-container').classList.add('loaded');
      if (savedData && (savedData.ch > 0 || parseFloat(savedData.pct) > 2)) {
        setTimeout(showPopup, 700);
      }
    } else {
      document.title = 'THE VAULT | ' + story.title;
      document.getElementById('story-title').textContent = story.title;
      document.getElementById('story-synopsis').textContent = story.synopsis || '';
      document.getElementById('story-content').innerHTML = story.text || story.content || '';
      document.getElementById('story-content').style.fontSize = fontSize + 'px';
      document.getElementById('story-container').classList.add('loaded');
      if (savedData && parseFloat(savedData.pct) > 2) {
        setTimeout(showPopup, 700);
      }
    }
  }

  window.onload = init;
</script>

</body>
</html>
