<style>

<body>

<div id="scroll-bar"></div>

<div id="resume-popup">
  <div class="popup-inner">
    <div class="popup-heading">Welcome back.</div>
    <div class="popup-body" id="popup-msg">Resume from where you left off?</div>
    <div class="popup-actions">
      <button class="popup-yes" onclick="doResume()">Resume</button>
      <button class="popup-no" onclick="doStartOver()">Start Over</button>
    </div>
  </div>
</div>

<nav id="top-nav">
  <button class="nav-logo" onclick="location.href='gallery.html'">V.</button>
  <div class="nav-right">
    <div class="font-pill">
      <button onclick="changeFont(-2)" aria-label="Decrease font size">A−</button>
      <div class="font-sep"></div>
      <button onclick="changeFont(2)" aria-label="Increase font size">A+</button>
    </div>
    <button id="theme-btn" onclick="toggleTheme()">☽ Dark</button>
  </div>
</nav>

<main id="story-container">
  <div id="chapter-eyebrow"></div>
  <h1 id="story-title"></h1>
  <p id="story-synopsis"></p>

  <div id="ch-bar">
    <button class="ch-btn" id="prev-ch-top" onclick="goChapter(chIndex - 1)">← Prev</button>
    <span id="ch-label"></span>
    <button class="ch-btn" id="next-ch-top" onclick="goChapter(chIndex + 1)">Next →</button>
  </div>

  <div id="story-content"></div>

  <div id="ch-footer">
    <div class="ch-end-label">✦ End of Chapter <span id="ch-footer-num"></span> ✦</div>
    <button id="next-ch-btn" onclick="goChapter(chIndex + 1)">Next Chapter →</button>
    <button id="prev-ch-link" onclick="goChapter(chIndex - 1)">← Previous Chapter</button>
  </div>
</main>

<section id="comment-section" style="display:none;">
  <div class="comment-section-title">✦ Transmissions</div>
  <div class="comment-form">
    <textarea class="comment-textarea" id="comment-text" placeholder="Leave a transmission…" maxlength="2000"></textarea>
    <button class="comment-submit" id="comment-btn" onclick="submitComment()">Transmit</button>
    <div class="comment-msg" id="comment-msg"></div>
  </div>
  <div class="comments-list" id="comments-list">
    <div class="comments-loading">Loading transmissions…</div>
  </div>
</section>

<script>
  /* ── CONFIG ── */
  var SUPABASE_URL = 'https://iakkxwghbczalryylqzg.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_WL-bPgOrYIK-PGgHk3-6YQ_Re7SIb1-';

  /* ── STATE ── */
  var fontSize  = parseInt(localStorage.getItem('readerFontSize')) || 18;
  var storyId   = null;
  var story     = null;
  var isNovella = false;
  var chIndex   = 0;
  var scrollTimer = null;
  var savedData = null;

  /* ── TOKEN STORE ── persists in localStorage so delete works after refresh ── */
  function myTokens() {
    try { return JSON.parse(localStorage.getItem('vault_tokens') || '{}'); } catch(e) { return {}; }
  }
  function saveToken(commentId, token) {
    var t = myTokens();
    t[String(commentId)] = token;
    localStorage.setItem('vault_tokens', JSON.stringify(t));
  }
  function getToken(commentId) {
    return myTokens()[String(commentId)] || null;
  }
  function genToken() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  /* ── THEME ── */
  (function() {
    var t = localStorage.getItem('vaultTheme') || 'dark';
    if (t === 'light') document.body.classList.add('light');
    document.getElementById('theme-btn').textContent = t === 'light' ? '☀ Light' : '☽ Dark';
  })();

  function toggleTheme() {
    var isLight = document.body.classList.toggle('light');
    localStorage.setItem('vaultTheme', isLight ? 'light' : 'dark');
    document.getElementById('theme-btn').textContent = isLight ? '☀ Light' : '☽ Dark';
  }

  function changeFont(d) {
    fontSize = Math.min(Math.max(fontSize + d, 12), 32);
    document.getElementById('story-content').style.fontSize = fontSize + 'px';
    localStorage.setItem('readerFontSize', fontSize);
  }

  /* ── SCROLL ── */
  window.addEventListener('scroll', function() {
    var scrolled = document.documentElement.scrollTop;
    var total = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    var pct = total > 0 ? (scrolled / total) * 100 : 0;
    document.getElementById('scroll-bar').style.width = pct + '%';
    if (!storyId) return;
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(function() {
      localStorage.setItem('progress_' + storyId, JSON.stringify({
        pct: pct.toFixed(2), ch: chIndex, opened: true
      }));
    }, 1000);
  });

  /* ── SWIPE ── */
  var touchY = 0;
  document.addEventListener('touchstart', function(e) { touchY = e.touches[0].clientY; });
  document.addEventListener('touchend', function(e) {
    if (!isNovella) return;
    var dy = touchY - e.changedTouches[0].clientY;
    var atBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 80;
    var atTop = window.scrollY <= 10;
    if (dy > 80 && atBottom) goChapter(chIndex + 1);
    if (dy < -80 && atTop)   goChapter(chIndex - 1);
  });

  /* ── RESUME POPUP ── */
  function showPopup() {
    var pct = Math.round(parseFloat(savedData.pct));
    var msg = isNovella && savedData.ch > 0
      ? 'You were on Chapter ' + (savedData.ch + 1) + '. Pick up from there?'
      : 'You were ' + pct + '% through. Resume from there?';
    document.getElementById('popup-msg').textContent = msg;
    document.getElementById('resume-popup').classList.add('show');
  }

  function doResume() {
    document.getElementById('resume-popup').classList.remove('show');
    if (isNovella) { chIndex = savedData.ch || 0; renderChapter(); }
    setTimeout(function() {
      var total = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      window.scrollTo({ top: (parseFloat(savedData.pct) / 100) * total, behavior: 'smooth' });
    }, 300);
  }

  function doStartOver() {
    document.getElementById('resume-popup').classList.remove('show');
    if (isNovella) { chIndex = 0; renderChapter(); }
    window.scrollTo({ top: 0 });
  }

  /* ── CHAPTER RENDER ── */
  function renderChapter() {
    var ch = story.chapters[chIndex];
    var total = story.chapters.length;
    document.getElementById('chapter-eyebrow').textContent = story.title + '  ·  Chapter ' + (chIndex + 1) + ' of ' + total;
    document.getElementById('story-title').textContent = ch.title || ('Chapter ' + (chIndex + 1));
    document.getElementById('story-synopsis').textContent = ch.synopsis || '';
    document.getElementById('story-content').innerHTML = ch.text || '';
    document.getElementById('story-content').style.fontSize = fontSize + 'px';
    document.title = 'THE VAULT | ' + story.title + ' · Ch.' + (chIndex + 1);
    document.getElementById('ch-label').textContent = (chIndex + 1) + ' / ' + total;
    document.getElementById('prev-ch-top').disabled = chIndex === 0;
    document.getElementById('next-ch-top').disabled = chIndex === total - 1;
    document.getElementById('ch-footer-num').textContent = chIndex + 1;
    document.getElementById('next-ch-btn').style.display = chIndex < total - 1 ? 'block' : 'none';
    document.getElementById('prev-ch-link').style.display = chIndex > 0 ? 'block' : 'none';
    document.getElementById('ch-footer').classList.add('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    loadComments();
  }

  function goChapter(i) {
    if (!story || !story.chapters) return;
    if (i < 0 || i >= story.chapters.length) return;
    chIndex = i;
    localStorage.setItem('progress_' + storyId, JSON.stringify({ pct: '0', ch: chIndex, opened: true }));
    renderChapter();
  }

  /* ── SUPABASE HELPERS ── */
  function sbHeaders(extra) {
    return Object.assign({
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY
    }, extra || {});
  }

  function commentKey() {
    return isNovella ? String(storyId) + '_ch' + chIndex : String(storyId);
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
  }

  /* ── LOAD COMMENTS ── */
  function loadComments() {
    var list = document.getElementById('comments-list');
    list.innerHTML = '<div class="comments-loading">Loading transmissions…</div>';
    fetch(
      SUPABASE_URL + '/rest/v1/comments'
      + '?story_id=eq.' + encodeURIComponent(commentKey())
      + '&parent_id=is.null'
      + '&order=created_at.asc'
      + '&select=id,content,created_at,token',
      { headers: sbHeaders() }
    )
    .then(function(r) { return r.json(); })
    .then(function(comments) {
      list.innerHTML = '';
      if (!comments || comments.length === 0) {
        list.innerHTML = '<div class="comments-empty">No transmissions yet. Be the first.</div>';
        return;
      }
      comments.forEach(function(c) {
        var card = buildCommentCard(c);
        list.appendChild(card);
        loadReplies(c.id, card.querySelector('.replies-list'));
      });
    })
    .catch(function() {
      list.innerHTML = '<div class="comments-empty">Could not load transmissions.</div>';
    });
  }

/* ── TOGGLE / CLOSE REPLY FORM ── */
function toggleReplyForm(btn) {
var actions = btn.closest(’.comment-actions’);
var form = actions.nextElementSibling;
var isOpen = form.classList.toggle(‘open’);
btn.textContent = isOpen ? ‘✕ Close’ : ‘↩ Reply’;
if (isOpen) form.querySelector(‘textarea’).focus();
else { form.querySelector(‘textarea’).value = ‘’; form.querySelector(’.comment-msg’).textContent = ‘’; }
}

function closeReplyForm(el) {
var form = el.closest(’.reply-form’);
form.classList.remove(‘open’);
form.querySelector(‘textarea’).value = ‘’;
form.querySelector(’.comment-msg’).textContent = ‘’;
var replyBtn = form.previousElementSibling.querySelector(’.reply-btn’);
if (replyBtn) replyBtn.textContent = ‘↩ Reply’;
}

/* ── LOAD REPLIES ── */
function loadReplies(parentId, container) {
fetch(
SUPABASE_URL + ‘/rest/v1/comments’
+ ‘?parent_id=eq.’ + parentId
+ ‘&order=created_at.asc’
+ ‘&select=id,content,created_at,token’,
{ headers: sbHeaders() }
)
.then(function(r) { return r.json(); })
.then(function(replies) {
container.innerHTML = ‘’;
if (!replies || replies.length === 0) return;
replies.forEach(function(r) {
var myToken = getToken(r.id);
var canDelete = myToken && myToken === r.token;
var rc = document.createElement(‘div’);
rc.className = ‘reply-card’;
rc.dataset.id = r.id;
rc.innerHTML =
‘<div class="reply-meta">’ +
‘<span class="reply-anon">Anonymous</span>’ +
‘<span class="reply-date">’ + formatDate(r.created_at) + ‘</span>’ +
‘</div>’ +
‘<div class="reply-text">’ + escapeHtml(r.content) + ‘</div>’ +
(canDelete ? ‘<button class="reply-delete-btn" onclick="deleteComment(' + r.id + ', this)">✕ Delete</button>’ : ‘’);
container.appendChild(rc);
});
});
}

/* ── SUBMIT TOP-LEVEL COMMENT ── */
function submitComment() {
var content = document.getElementById(‘comment-text’).value.trim();
var btn     = document.getElementById(‘comment-btn’);
if (!content) { showRootMsg(‘Write something first.’, ‘err’); return; }
btn.disabled = true;
showRootMsg(‘Sending…’, ‘’);
var token = genToken();
fetch(SUPABASE_URL + ‘/rest/v1/comments’, {
method: ‘POST’,
headers: sbHeaders({ ‘Prefer’: ‘return=representation’ }),
body: JSON.stringify({ story_id: commentKey(), content: content, author: ‘Anonymous’, token: token })
})
.then(function(r) { return r.json(); })
.then(function(data) {
var newId = Array.isArray(data) && data[0] ? data[0].id : null;
if (newId) saveToken(newId, token);
document.getElementById(‘comment-text’).value = ‘’;
showRootMsg(‘Transmission received.’, ‘ok’);
loadComments();
})
.catch(function() { showRootMsg(‘Network error. Try again.’, ‘err’); })
.finally(function() { btn.disabled = false; });
}

/* ── SUBMIT REPLY ── */
function submitReply(btn, parentId) {
var form     = btn.closest(’.reply-form’);
var textarea = form.querySelector(‘textarea’);
var msgEl    = form.querySelector(’.comment-msg’);
var content  = textarea.value.trim();
if (!content) { msgEl.textContent = ‘Write something first.’; msgEl.className = ‘comment-msg err’; return; }
btn.disabled = true;
msgEl.textContent = ‘Sending…’; msgEl.className = ‘comment-msg’;
var token = genToken();
fetch(SUPABASE_URL + ‘/rest/v1/comments’, {
method: ‘POST’,
headers: sbHeaders({ ‘Prefer’: ‘return=representation’ }),
body: JSON.stringify({ story_id: commentKey(), parent_id: parentId, content: content, author: ‘Anonymous’, token: token })
})
.then(function(r) { return r.json(); })
.then(function(data) {
var newId = Array.isArray(data) && data[0] ? data[0].id : null;
if (newId) saveToken(newId, token);
textarea.value = ‘’;
msgEl.textContent = ‘Reply sent.’; msgEl.className = ‘comment-msg ok’;
var repliesContainer = btn.closest(’.comment-card’).querySelector(’.replies-list’);
loadReplies(parentId, repliesContainer);
setTimeout(function() { closeReplyForm(btn); }, 1200);
})
.catch(function() { msgEl.textContent = ‘Network error.’; msgEl.className = ‘comment-msg err’; })
.finally(function() { btn.disabled = false; });
}

/* ── DELETE COMMENT (+ cascade via DB foreign key) ── */
function deleteComment(id, btn) {
if (!confirm(‘Delete this transmission?’)) return;
btn.disabled = true;
btn.textContent = ‘…’;
fetch(SUPABASE_URL + ‘/rest/v1/comments?id=eq.’ + id, {
method: ‘DELETE’,
headers: sbHeaders()
})
.then(function(r) {
if (r.ok) {
var card = btn.closest(’.comment-card’) || btn.closest(’.reply-card’);
if (card) {
card.style.opacity = ‘0’;
setTimeout(function() { card.remove(); }, 300);
}
} else {
btn.disabled = false;
btn.textContent = ‘✕ Delete’;
}
})
.catch(function() {
btn.disabled = false;
btn.textContent = ‘✕ Delete’;
});
}

function showRootMsg(text, type) {
var el = document.getElementById(‘comment-msg’);
el.textContent = text;
el.className = ‘comment-msg’ + (type ? ’ ’ + type : ‘’);
}

if (!story) {
document.getElementById(‘story-content’).textContent = ‘Record not found.’;
document.getElementById(‘story-container’).classList.add(‘loaded’);
return;
}
