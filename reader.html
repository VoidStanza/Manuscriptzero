<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE VAULT | RECORD</title>

<!-- SEO & Share Card -->
<meta name="description" content="Accessing the sanctum of Void Stanza.">
<meta property="og:title" content="THE VAULT | ManuscriptZero">
<meta property="og:description" content="Accessing the sanctum of Void Stanza.">
<meta property="og:image" content="https://voidstanza.github.io/Manuscriptzero/preview.png">
<meta property="og:url" content="https://voidstanza.github.io/Manuscriptzero/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="THE VAULT | ManuscriptZero">
<meta name="twitter:description" content="Accessing the sanctum of Void Stanza.">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
<script src="stories.js" defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:wght@400&family=Montserrat:wght@300;400;600&display=swap');

body { background:#0a0a0b; color:#e2e2e2; font-family:'Montserrat',sans-serif; margin:0; overflow-x:hidden; }
.serif { font-family:'Playfair Display',serif; }
.reading-font { font-family:'Lora',serif; line-height:1.9; transition:font-size .2s; }
#scroll-progress { position:fixed; top:0; left:0; height:2px; background:#d4af37; z-index:100; width:0%; box-shadow:0 0 10px #d4af37; }
#story-container { opacity: 0; transition: opacity 0.8s ease-in; }
#story-container.loaded { opacity: 1; }

#resume-banner {
  display: none;
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  border: 1px solid rgba(212,175,55,0.3);
  color: #d4af37;
  font-family: 'Montserrat', sans-serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 12px 24px;
  cursor: pointer;
  z-index: 200;
  white-space: nowrap;
  transition: background 0.3s;
}
#resume-banner:hover { background: #1a1a1a; }
</style>
</head>
<body>

<div id="scroll-progress"></div>

<nav class="fixed top-0 w-full p-6 bg-[#0a0a0b]/95 backdrop-blur-md border-b border-white/5 z-50 flex justify-between items-center">
  <h2 class="serif text-2xl text-[#d4af37] cursor-pointer hover:opacity-70" onclick="location.href='gallery.html'">V.</h2>
  <div class="flex items-center space-x-6">
    <span class="text-[9px] uppercase tracking-[0.4em] text-gray-500 hidden md:block">Record Decrypted</span>
    <div class="flex items-center border border-white/10 rounded-full px-3 py-1 bg-black/50">
      <button onclick="adjustFont(-2)" class="text-gray-500 text-xs px-2 font-bold">A-</button>
      <div class="w-[1px] h-3 bg-white/10 mx-1"></div>
      <button onclick="adjustFont(2)" class="text-gray-200 text-xs px-2 font-bold">A+</button>
    </div>
  </div>
</nav>

<!-- Resume banner -->
<div id="resume-banner" onclick="resumeReading()">
  ↓ Resume where you left off
</div>

<main id="story-container" class="max-w-2xl mx-auto px-6 pt-48 pb-24">
  <header class="mb-20 text-center">
    <h1 id="title" class="serif text-5xl text-[#d4af37] mb-6"></h1>
    <p id="synopsis" class="reading-font italic text-gray-500 text-lg"></p>
  </header>
  <article id="content" class="reading-font text-gray-300 text-lg mb-32"></article>
</main>

<script>
  let currentFontSize = parseInt(localStorage.getItem('readerFontSize')) || 18;
  let currentId = null;
  let saveTimer = null;

  function init() {
    const params = new URLSearchParams(window.location.search);
    currentId = params.get('id');

    if (!currentId || typeof stories === 'undefined') {
      document.getElementById("content").innerText = "Archive error: Missing ID or Stories list.";
      document.getElementById("story-container").classList.add('loaded');
      return;
    }

    const story = stories.find(s => s.id == currentId);

    if (!story) {
      document.getElementById("content").innerText = "Record " + currentId + " not found.";
      document.getElementById("story-container").classList.add('loaded');
      return;
    }

    document.title = "THE VAULT | " + story.title;
    document.getElementById("title").innerText = story.title;
    document.getElementById("synopsis").innerText = story.synopsis;
    document.getElementById("content").innerHTML = story.text || story.content;

    document.getElementById("content").style.fontSize = currentFontSize + "px";
    document.getElementById("story-container").classList.add('loaded');

    // Check for saved progress
    const savedProgress = localStorage.getItem('progress_' + currentId);
    if (savedProgress && parseFloat(savedProgress) > 2) {
      document.getElementById('resume-banner').style.display = 'block';
      // Auto-hide banner after 6 seconds
      setTimeout(() => {
        document.getElementById('resume-banner').style.display = 'none';
      }, 6000);
    }
  }

  function resumeReading() {
    const savedProgress = localStorage.getItem('progress_' + currentId);
    if (savedProgress) {
      const scrollTarget = (parseFloat(savedProgress) / 100) *
        (document.documentElement.scrollHeight - document.documentElement.clientHeight);
      window.scrollTo({ top: scrollTarget, behavior: 'smooth' });
    }
    document.getElementById('resume-banner').style.display = 'none';
  }

  function adjustFont(delta) {
    currentFontSize = Math.min(Math.max(currentFontSize + delta, 12), 32);
    document.getElementById("content").style.fontSize = currentFontSize + "px";
    localStorage.setItem('readerFontSize', currentFontSize);
  }

  window.onscroll = function () {
    const winScroll = document.documentElement.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    const scrolled = (winScroll / height) * 100;

    // Update progress bar
    document.getElementById("scroll-progress").style.width = scrolled + "%";

    // Save progress per story (debounced — saves 1 second after scrolling stops)
    if (currentId) {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        localStorage.setItem('progress_' + currentId, scrolled.toFixed(2));
      }, 1000);
    }
  };

  window.onload = init;
</script>

</body>
</html>
