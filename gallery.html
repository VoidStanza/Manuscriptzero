<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT | GALLERY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="stories.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:ital@0;1&display=swap');
        
        body { background: #0a0a0b; color: #e2e2e2; font-family: 'Lora', serif; }
        .card { 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            overflow: hidden; 
            background: #111;
        }
        .card:hover {
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card:hover img { filter: grayscale(0%); transform: scale(1.05); }
        img { filter: grayscale(100%); transition: all 0.8s ease; }
        .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="p-8">

    <nav class="mb-20 max-w-6xl mx-auto flex justify-between items-center">
        <h1 class="serif text-[#d4af37] text-3xl tracking-tighter cursor-pointer" onclick="location.href='index.html'">V.</h1>
        
        <button onclick="goToLatest()" class="text-[9px] uppercase tracking-[0.4em] text-[#d4af37] border border-[#d4af37]/30 px-6 py-2 hover:bg-[#d4af37] hover:text-black transition-all">
            Access Latest Artifact
        </button>
    </nav>

    <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 max-w-6xl mx-auto">
        </div>

    <script>
        // Use the stories array from stories.js
        const renderGrid = () => {
            const gridElement = document.getElementById('grid');
            
            // Safety check: if stories.js isn't loaded, don't crash
            if (typeof stories === 'undefined') {
                gridElement.innerHTML = "<p class='text-red-500'>Error: stories.js not found.</p>";
                return;
            }

            gridElement.innerHTML = stories.map(s => `
                <div onclick="location.href='reader.html?id=${s.id}'" class="card cursor-pointer group">
                    <div class="aspect-[2/3] w-full overflow-hidden">
                        <img src="${s.cover}" alt="${s.title}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-2">
                             <h3 class="serif text-lg text-[#d4af37] group-hover:text-white transition-colors">${s.title}</h3>
                             <span class="text-[8px] text-gray-600 font-mono">ID: ${s.id}</span>
                        </div>
                        <p class="text-xs text-gray-500 leading-relaxed italic line-clamp-2">${s.synopsis}</p>
                        <div class="mt-4 pt-4 border-t border-white/5 flex justify-end items-center">
                            <span class="text-[8px] uppercase tracking-widest text-[#d4af37] opacity-0 group-hover:opacity-100 transition-opacity">Read Record →</span>
                        </div>
                    </div>
                </div>
            `).join('');
        };

        function goToLatest() {
            if (typeof stories !== 'undefined' && stories.length > 0) {
                const latestId = Math.max(...stories.map(s => s.id));
                window.location.href = `reader.html?id=${latestId}`;
            }
        }

        renderGrid();
    </script>
</body>
</html>
