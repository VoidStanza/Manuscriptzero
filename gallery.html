<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE VAULT | GALLERY</title>

<meta name="description" content="Accessing the sanctum of Void Stanza.">
<meta property="og:title" content="THE VAULT | ManuscriptZero">
<meta property="og:description" content="Accessing the sanctum of Void Stanza.">
<meta property="og:image" content="https://voidstanza.github.io/Manuscriptzero/preview.png">
<meta property="og:url" content="https://voidstanza.github.io/Manuscriptzero/gallery.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="THE VAULT | ManuscriptZero">
<meta name="twitter:description" content="Accessing the sanctum of Void Stanza.">
<meta name="twitter:image" content="https://voidstanza.github.io/Manuscriptzero/preview.png">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
<script src="stories.js" defer></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:ital@0;1&family=Montserrat:wght@300;400&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0a0b;
  color: #e2e2e2;
  font-family: 'Montserrat', sans-serif;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.4rem 2.5rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  position: sticky;
  top: 0;
  background: rgba(10,10,11,0.97);
  backdrop-filter: blur(12px);
  z-index: 50;
}

.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.75rem;
  color: #d4af37;
  cursor: pointer;
  background: none;
  border: none;
}

.nav-btn {
  font-size: 9px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: #d4af37;
  border: 1px solid rgba(212,175,55,0.3);
  padding: 8px 20px;
  background: transparent;
  cursor: pointer;
  font-family: 'Montserrat', sans-serif;
  transition: background 0.2s, color 0.2s;
}
.nav-btn:hover { background: #d4af37; color: #000; }

/* HEADER */
.gallery-header {
  text-align: center;
  padding: 2.5rem 2rem 1.75rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

.gallery-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 11px;
  letter-spacing: 0.6em;
  text-transform: uppercase;
  color: #d4af37;
  margin-bottom: 0.4rem;
}

.gallery-header p {
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #333;
}

/* GRID */
.grid-wrap {
  padding: 2rem 2.5rem 4rem;
  max-width: 1400px;
  margin: 0 auto;
}

.story-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.25rem;
}

@media (max-width: 1100px) { .story-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 768px)  { .story-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px)  { .story-grid { grid-template-columns: 1fr; } }

/* CARD */
.card {
  background: #0f0f10;
  border: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
  transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
  display: flex;
  flex-direction: column;
  height: 380px; /* slightly taller to fit status row */
}

.card:hover {
  border-color: rgba(212,175,55,0.35);
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.6);
}

/* IMAGE */
.card-img {
  width: 100%;
  height: 200px;
  flex-shrink: 0;
  overflow: hidden;
  background: #111;
}

.card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(80%);
  transition: filter 0.5s, transform 0.5s;
}

.card:hover .card-img img {
  filter: grayscale(0%);
  transform: scale(1.05);
}

.card-img.no-cover {
  display: flex;
  align-items: center;
  justify-content: center;
  background: repeating-linear-gradient(45deg, #111 0, #111 1px, #0f0f10 0, #0f0f10 50%) center / 8px 8px;
}

.card-img.no-cover span {
  font-size: 9px;
  letter-spacing: 0.3em;
  color: #2a2a2a;
  text-transform: uppercase;
}

/* BODY */
.card-body {
  padding: 0.85rem 1rem;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow: hidden;
}

.card-top { overflow: hidden; }

.card-id {
  font-size: 8px;
  letter-spacing: 0.3em;
  color: #2a2a2a;
  font-family: 'Montserrat', sans-serif;
  margin-bottom: 3px;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  color: #c0c0c0;
  line-height: 1.3;
  margin-bottom: 5px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  transition: color 0.2s;
}

.card:hover .card-title { color: #e8e8e8; }

.card-synopsis {
  font-family: 'Lora', serif;
  font-size: 10px;
  color: #4a4a4a;
  line-height: 1.6;
  font-style: italic;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* CARD BOTTOM ROW — status + open record */
.card-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 0.65rem;
  padding-top: 0.65rem;
  border-top: 1px solid rgba(255,255,255,0.04);
}

/* STATUS BADGE */
.status-badge {
  font-size: 8px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  font-family: 'Montserrat', sans-serif;
  padding: 3px 8px;
  border-radius: 2px;
}

/* Open — untouched, dim */
.status-open {
  color: #333;
  border: 1px solid #222;
}

/* Active — gold, reader is mid-story */
.status-active {
  color: #d4af37;
  border: 1px solid rgba(212,175,55,0.35);
  background: rgba(212,175,55,0.05);
}

/* Sealed — muted green, done */
.status-sealed {
  color: #6a9a6a;
  border: 1px solid rgba(106,154,106,0.35);
  background: rgba(106,154,106,0.05);
}

.card-cta {
  font-size: 8px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #d4af37;
  opacity: 0;
  transition: opacity 0.3s;
  font-family: 'Montserrat', sans-serif;
}

.card:hover .card-cta { opacity: 1; }
</style>
</head>
<body>

<nav>
  <button class="nav-logo" onclick="location.href='index.html'">V.</button>
  <button class="nav-btn" onclick="goToLatest()">Access Latest Artifact</button>
</nav>

<div class="gallery-header">
  <h2>The Archive</h2>
  <p id="record-count">Decrypting records...</p>
</div>

<div class="grid-wrap">
  <div id="grid" class="story-grid"></div>
</div>

<script>
  // ── READ STATUS FROM LOCALSTORAGE ──
  // Returns 'open' | 'active' | 'sealed'
  function getStatus(storyId) {
    try {
      var raw = localStorage.getItem('progress_' + storyId);
      if (!raw) return 'open';
      var data = JSON.parse(raw);
      var pct = parseFloat(data.pct || 0);
      if (pct >= 90) return 'sealed';   // 90%+ = sealed
      if (pct > 2)   return 'active';   // any real progress = active
      return 'open';
    } catch(e) {
      return 'open';
    }
  }

  function statusBadge(storyId) {
    var s = getStatus(storyId);
    var map = {
      open:   { cls: 'status-open',   label: 'Open'   },
      active: { cls: 'status-active', label: 'Active' },
      sealed: { cls: 'status-sealed', label: 'Sealed' }
    };
    var m = map[s];
    return '<span class="status-badge ' + m.cls + '">' + m.label + '</span>';
  }

  function renderGrid() {
    var grid = document.getElementById('grid');
    var countEl = document.getElementById('record-count');

    if (typeof stories === 'undefined' || !stories.length) {
      grid.innerHTML = "<p style='color:#333;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;'>Archives unavailable.</p>";
      return;
    }

    countEl.textContent = stories.length + ' record' + (stories.length !== 1 ? 's' : '') + ' in the vault';

    grid.innerHTML = stories.map(function(s) {
      var hasCover = s.cover && s.cover.trim() !== '';
      var imgBlock = hasCover
        ? '<div class="card-img"><img src="' + s.cover + '" alt="' + s.title + '" loading="lazy" onerror="this.parentElement.className=\'card-img no-cover\';this.remove();this.parentElement.innerHTML=\'<span>No Image</span>\';"></div>'
        : '<div class="card-img no-cover"><span>No Image</span></div>';

      return '<div class="card" onclick="location.href=\'reader.html?id=' + s.id + '\'">'
        + imgBlock
        + '<div class="card-body">'
        +   '<div class="card-top">'
        +     '<div class="card-id">#' + String(s.id).padStart(3,'0') + '</div>'
        +     '<div class="card-title">' + s.title + '</div>'
        +     '<div class="card-synopsis">' + (s.synopsis || '') + '</div>'
        +   '</div>'
        +   '<div class="card-bottom">'
        +     statusBadge(s.id)
        +     '<span class="card-cta">Open Record →</span>'
        +   '</div>'
        + '</div>'
        + '</div>';
    }).join('');
  }

  function goToLatest() {
    if (typeof stories !== 'undefined' && stories.length > 0) {
      var latestId = Math.max.apply(null, stories.map(function(s) { return s.id; }));
      window.location.href = 'reader.html?id=' + latestId;
    }
  }

  window.onload = renderGrid;
</script>
</body>
</html>
