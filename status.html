<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ManuscriptZero</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Montserrat:wght@300&display=swap');
  body {
    background:#0a0a0a; color:#e8e4dc; font-family:'Montserrat',sans-serif; font-weight:300;
    display:flex; align-items:center; justify-content:center; height:100vh; margin:0;
    padding: 0 1.5rem; box-sizing: border-box;
  }
  .box { text-align:center; }
  .sigil { font-family:'Cormorant Garamond',serif; font-size:3rem; color:#b8964a; }
  .msg {
    font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase;
    margin-top:1.5rem; line-height: 1.8;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="sigil">V.</div>
    <div class="msg" id="msg">Loading…</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const type = params.get('type') || 'info';
    const msg = params.get('msg') || 'Done.';

    const colors = {
      success: '#b8964a',
      blocked: '#8b4040',
      error:   '#8b3a3a',
      info:    '#555'
    };

    const msgEl = document.getElementById('msg');
    msgEl.textContent = msg;
    msgEl.style.color = colors[type] || colors.info;
  </script>
</body>
</html>
